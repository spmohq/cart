<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent PayPal Button</title>

    <style>
        /* Basic styling to center the content */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }
        #paypal-button-container {
            margin-top: 20px;
            width: 300px; /* Adjust width as needed */
        }
    </style>
</head>
<body>

    <h1>Buy Me a Coffee</h1>
    <p>Your support is greatly appreciated!</p>

    <!-- 1. This is the container where the PayPal buttons will be rendered. -->
    <div id="paypal-button-container"></div>

    <!-- 2. Add the PayPal JavaScript SDK. Replace YOUR_CLIENT_ID_HERE with your own Client ID. -->
    <script src="https://www.paypal.com/sdk/js?client-id=ARuQiBdLCSibV6EijtyL-UFfas-QYNaFysNQkYiP9hxHlbGLGUZKqBGHMf-djX8EnJVKJ11MXOALyIjk&currency=USD" async></script>

    <!-- 3. This script renders the buttons and handles the transaction. -->
    <script>
        paypal.Buttons({
            // This function sets up the details of the transaction,
            // including the amount, when the user clicks the button.
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        description: 'A delicious virtual coffee', // Description of the item
                        amount: {
                            value: '5.00' // <-- EDIT THIS: The price of your item.
                        }
                    }]
                });
            },

            // This function is called after the user approves the payment.
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    // Show a success message to the buyer
                    alert('Thank you for your purchase, ' + details.payer.name.given_name + '!');
                    
                    // You can optionally redirect the user to a "Thank You" page
                    // window.location.href = 'thank-you.html';
                });
            },

            // Optional: Handle errors
            onError: function(err) {
                console.error('An error occurred with the PayPal button:', err);
                alert('An error occurred with your payment. Please try again.');
            }

        }).render('#paypal-button-container');
        // This targets the div with id="paypal-button-container" to display the buttons.
    </script>

</body>
</html>
