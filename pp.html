<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Purchase Page</title>

    <style>
        /* Basic styling for presentation */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #f7f7f7;
        }
        .product-box {
            background-color: white;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            margin-top: 0;
        }
        #paypal-button-container {
            margin-top: 25px;
            /* The width of the buttons is controlled by PayPal's script */
        }
    </style>
</head>
<body>

    <div class="product-box">
        <h1>Premium Content Access</h1>
        <p>A one-time purchase for our digital content pack.</p>
        <p><strong>Price: $7.00 USD</strong></p>

        <!-- 1. This is the container where the PayPal buttons will be rendered. -->
        <div id="paypal-button-container"></div>
    </div>

    <!-- 2. Add the PayPal JavaScript SDK. -->
    <!-- IMPORTANT: Replace YOUR_LIVE_CLIENT_ID_HERE with your real Live Client ID -->
    <script src="https://www.paypal.com/sdk/js?client-id=ARuQiBdLCSibV6EijtyL-UFfas-QYNaFysNQkYiP9hxHlbGLGUZKqBGHMf-djX8EnJVKJ11MXOALyIjk&currency=USD" async></script>

    <!-- 3. This script renders the buttons and handles the transaction. -->
    <script>
        paypal.Buttons({
            // This function sets up the transaction details.
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        description: 'Premium Content Access', // Clear product name
                        amount: {
                            currency_code: 'USD',
                            value: '7.00' // The price for the product
                        }
                    }]
                });
            },

            // This function is called after the user approves the payment.
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    // Show a success message to the buyer
                    alert('Thank you for your purchase, ' + details.payer.name.given_name + '!');
                });
            },

            // Optional: Handle errors for debugging.
            onError: function(err) {
                console.error('An error occurred with the PayPal button:', err);
                alert('An error occurred. Please check the developer console for more information.');
            }

        }).render('#paypal-button-container');
        // This targets the div with id="paypal-button-container" to display the buttons.
    </script>

</body>
</html>
