<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Purchase with Pop-Up</title>

    <style>
        /* Basic styling for presentation */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #f7f7f7;
        }
        .product-box {
            background-color: white;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            margin-top: 0;
        }
        #paypal-button-container {
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="product-box">
        <h1>Premium Content Access</h1>
        <p>A one-time purchase for our digital content pack.</p>
        <p><strong>Price: $7.00 USD</strong></p>

        <!-- The container where the pop-up buttons will appear -->
        <div id="paypal-button-container"></div>
    </div>

    <!-- Add the PayPal JavaScript SDK -->
    <!-- REPLACE THE PLACEHOLDER BELOW WITH YOUR NEW LIVE CLIENT ID -->
    <script src="https://www.paypal.com/sdk/js?client-id=Aeq_TH4mG_CkNvCi8QoYP3cIVyKw-0sxIqNNzkBJaf5eRQGc7OygRsYv7RHxMGTfQMTkK2izqJ9GkCz6&currency=USD" async></script>

    <!-- This script renders the buttons and handles the transaction -->
    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        description: 'Premium Content Access',
                        amount: {
                            currency_code: 'USD',
                            value: '7.00'
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('Thank you for your purchase, ' + details.payer.name.given_name + '!');
                });
            },
            onError: function(err) {
                console.error('PayPal Button Error:', err);
                alert('An error occurred. Please check the developer console.');
            }
        }).render('#paypal-button-container');
    </script>

</body>
</html>
